<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <!-- DO quadrant (amber) -->
  <rect x="0" y="0" width="16" height="16" fill="#FFB800"/>
  <!-- CO quadrant (blue) -->
  <rect x="16" y="0" width="16" height="16" fill="#3B82F6"/>
  <!-- DE quadrant (rose) -->
  <rect x="0" y="16" width="16" height="16" fill="#F43F5E"/>
  <!-- GO quadrant (emerald) -->
  <rect x="16" y="16" width="16" height="16" fill="#10B981"/>
  <!-- Cross dividers -->
  <rect x="15" y="0" width="2" height="32" fill="#000000"/>
  <rect x="0" y="15" width="32" height="2" fill="#000000"/>
  <!-- Outer border -->
  <rect x="0" y="0" width="32" height="32" fill="none" stroke="#000000" stroke-width="2"/>
</svg>
