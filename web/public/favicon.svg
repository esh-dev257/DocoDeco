<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <!-- Yellow background with black border (neo-brutalism) -->
  <rect x="1" y="1" width="30" height="30" fill="#f5e642" stroke="#0a0a0a" stroke-width="2"/>
  <!-- Hard offset shadow -->
  <rect x="3" y="3" width="30" height="30" fill="none" stroke="#0a0a0a" stroke-width="1" opacity="0.15"/>
  <!-- Clipboard body -->
  <rect x="9" y="10" width="14" height="16" fill="#ffffff" stroke="#0a0a0a" stroke-width="1.5"/>
  <!-- Clipboard clip -->
  <rect x="13" y="7" width="6" height="5" rx="1" fill="#0a0a0a"/>
  <rect x="14" y="8" width="4" height="3" rx="0.5" fill="#f5e642"/>
  <!-- Lines on clipboard -->
  <line x1="12" y1="15" x2="20" y2="15" stroke="#0a0a0a" stroke-width="1.5" stroke-linecap="square"/>
  <line x1="12" y1="18" x2="20" y2="18" stroke="#0a0a0a" stroke-width="1.5" stroke-linecap="square"/>
  <line x1="12" y1="21" x2="17" y2="21" stroke="#0a0a0a" stroke-width="1.5" stroke-linecap="square"/>
</svg>
