<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Amber background — DO pillar primary color -->
  <rect width="32" height="32" fill="#FFB800"/>
  <!-- Bold "D" lettermark using evenodd to punch the bowl -->
  <path
    fill="#000000"
    fill-rule="evenodd"
    d="M 5 4 L 19 4 Q 28 4 28 16 Q 28 28 19 28 L 5 28 Z
       M 10 9 L 18 9 Q 23 9 23 16 Q 23 23 18 23 L 10 23 Z"
  />
  <!-- Thick black border — neo-brutalist -->
  <rect x="1" y="1" width="30" height="30" fill="none" stroke="#000000" stroke-width="2"/>
</svg>
